name: pocket_llm
description: "Yet Another New Flutter Project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.0
  go_router: ^13.2.0
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  firebase_core: ^3.6.0
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  pretty_dio_logger: ^1.4.0
  slang: ^4.13.0
  slang_flutter: ^4.13.0
  talker_flutter: ^5.1.15
  firebase_crashlytics: ^4.3.10
  llama_cpp_dart: ^0.1.0
  path_provider: ^2.1.2
  path: ^1.9.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  # Change this to your actual app logo when ready
  # image_path: "assets/icon.png"
  color: "#FFFFFF"

flutter_native_splash:
  color: "#FFFFFF"
  # Change this to your actual splash logo when ready
  # image: "assets/splash.png"
  android_12:
    color: "#FFFFFF"
    # image: "assets/splash.png"

slang:
  base_locale: en
  input_directory: lib/i18n
  input_file_pattern: .i18n.yaml
  output_directory: lib/i18n
  output_file_name: strings.g.dart
